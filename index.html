<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Token Debugger - CategoryScreen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .token-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .badge-admin { background-color: #dcfce7; color: #166534; }
        .badge-user { background-color: #e0f2fe; color: #075985; }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .modal-overlay {
            backdrop-filter: blur(4px);
            background-color: rgba(15, 23, 42, 0.6);
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left: Token List Grid (2 Columns wide on large screens) -->
        <div class="lg:col-span-2">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        FCM Token List
                    </h1>
                </div>
                <button id="refreshBtn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-all shadow-sm active:scale-95 text-sm">
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Refresh Tokens
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-bottom border-slate-200">
                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase">User</th>
                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase">FCM Token</th>
                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase">Last Activity</th>
                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tokenTableBody" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                    Click Refresh to load tokens.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right: Send Notification Form -->
        <div class="lg:col-span-1">
            <div class="glass sticky top-8 rounded-2xl shadow-xl p-6 border border-slate-200">
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Send Notification</h2>
                    <p class="text-slate-500 text-xs mt-1">Push alerts to the selected device</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-tight">Project ID</label>
                        <input type="text" id="projectId" value="scholars-grade"
                            class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-tight">Recipient Token</label>
                        <textarea id="fcmTokenInput" rows="3" placeholder="Click 'Select' on a token from the list..."
                            class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-[10px] font-mono leading-tight bg-slate-50"></textarea>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-tight">Title</label>
                            <input type="text" id="notifTitle" placeholder="Notification title" value="Result Update"
                                class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-tight">Body</label>
                            <input type="text" id="notifBody" placeholder="Notification message" value="All student results updated"
                                class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1 uppercase tracking-tight">Redirect URL (Optional)</label>
                        <input type="text" id="notifUrl" placeholder="https://app.scholarsgrade.com/result" value="https://app.scholarsgrade.com/fees/history"
                            class="w-full p-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>

                    <button onclick="sendNotification()" id="sendBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg shadow-blue-200 mt-2 flex items-center justify-center active:scale-95 disabled:opacity-50">
                        <span>Send Now</span>
                    </button>

                    <div id="statusBox" class="hidden mt-4 p-3 rounded-lg text-xs text-center font-medium"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Token Detail Modal -->
    <div id="modal" class="fixed inset-0 hidden z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 modal-overlay transition-opacity" onclick="closeModal()"></div>
            <div class="inline-block bg-white rounded-xl text-left overflow-hidden shadow-2xl transform transition-all sm:max-w-2xl sm:w-full relative z-10">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-slate-900">Token Details</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="p-6 bg-slate-50">
                    <pre id="modalTokenContent" class="bg-slate-900 text-indigo-300 p-4 rounded-lg text-xs font-mono break-all whitespace-pre-wrap max-h-60 overflow-y-auto"></pre>
                </div>
                <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-2">
                    <button onclick="copyCurrentModalToken()" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">Copy</button>
                    <button onclick="selectTokenFromModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">Use for Notification</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-[60]">
        <span id="toastMsg"></span>
    </div>

    <script>
        const refreshBtn = document.getElementById('refreshBtn');
        const refreshIcon = document.getElementById('refreshIcon');
        const tableBody = document.getElementById('tokenTableBody');
        const fcmTokenInput = document.getElementById('fcmTokenInput');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const modal = document.getElementById('modal');
        const modalTokenContent = document.getElementById('modalTokenContent');

        function showToast(message) {
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Copied to clipboard');
        }

        function openModal(token) {
            modalTokenContent.innerText = token;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        function copyCurrentModalToken() {
            copyToClipboard(modalTokenContent.innerText);
        }

        function selectTokenFromModal() {
            selectToken(modalTokenContent.innerText);
            closeModal();
        }

        function selectToken(token) {
            fcmTokenInput.value = token;
            fcmTokenInput.classList.remove('bg-slate-50');
            fcmTokenInput.classList.add('bg-white', 'border-blue-400');
            showToast('Token selected for notification');
            // Scroll to form on mobile
            if(window.innerWidth < 1024) {
                document.getElementById('sendBtn').scrollIntoView({ behavior: 'smooth' });
            }
        }

   


async function fetchFCMTokens() {
    refreshBtn.disabled = true;
    refreshIcon.classList.add('animate-spin');
    tableBody.innerHTML = `<tr><td colspan="4" class="px-6 py-12"><div class="h-4 loading-shimmer rounded w-full"></div></td></tr>`;

    // The XSRF-TOKEN provided
    const xsrfToken = "eyJpdiI6ImdnVldDdzBibnd0a1cxZmFWOUJ3M1E9PSIsInZhbHVlIjoiamwvNVlOVStVNm9uRHFEc0ZjdmtBbGpUVGF3UVdDODRra2VDVVlBRERJMDlPVEZTL1RZWGtHRkhCcFN2MHFtbGd0Vzh4ZVV5Q1RuM09WdXkrWEZxNng1VG9lUkhSOEZhdWYvK1J5L21PZkhuWWxZNEdvVjc5N01tYlBNSXltSlciLCJtYWMiOiIyMjc0ZDlmMzNhMGJjOTA1ZGY5YTA0OTZiZWE0MWJhZGIwNDc1ZmEzZTkzOTI3YWI2YWNlNTgxNDY3MDk4MDBmIiwidGFnIjoiIn0";

    try {
        const response = await fetch('https://app.scholarsgrade.com/api/fcm-token', {
            method: 'GET',
            mode: 'cors', // Explicitly set CORS mode
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                'X-XSRF-TOKEN': decodeURIComponent(xsrfToken) // Ensure token is decoded if necessary
            },
            credentials: 'include' 
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.message || `Server Error ${response.status}: ${response.statusText}`);
        }

        const result = await response.json();
        const tokens = result.data || result; 
        
        if (Array.isArray(tokens)) {
            renderTokens(tokens);
            showToast('Tokens loaded successfully');
        } else {
            throw new Error("Invalid data format received from server");
        }

    } catch (error) {
        // Log detailed error to console for CategoryScreen to inspect
        console.error("DEBUGGER ERROR:", {
            message: error.message,
            stack: error.stack,
            type: error.name
        });

        let errorMsg = error.message;
        if (error.message.includes('Failed to fetch')) {
            errorMsg = "CORS Blocked or Network Error. Check if your domain is allowed in 'Access-Control-Allow-Origin' on the server.";
        }

        tableBody.innerHTML = `
            <tr>
                <td colspan="4" class="px-6 py-12 text-center text-red-500 bg-red-50">
                    <div class="flex flex-col items-center gap-2">
                        <svg class="w-8 h-8 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <p class="font-bold">Error Occurred</p>
                        <p class="text-[10px] max-w-xs mx-auto">${errorMsg}</p>
                        <p class="text-[9px] mt-2 opacity-70 italic font-mono">Check Browser Console (F12) for detailed logs</p>
                    </div>
                </td>
            </tr>`;
    } finally {
        refreshBtn.disabled = false;
        refreshIcon.classList.remove('animate-spin');
    }
}


        

        function renderTokens(tokens) {
            if (!tokens.length) {
                tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center">No tokens.</td></tr>';
                return;
            }

            tableBody.innerHTML = tokens.map(token => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3">
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-900 text-sm">ID: ${token.user_id}</span>
                            <span class="text-[9px] px-1.5 py-0.5 rounded-full w-fit mt-0.5 font-bold uppercase tracking-wider ${token.user_type === 'Admin' ? 'badge-admin' : 'badge-user'}">
                                ${token.user_type}
                            </span>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <code onclick="openModal('${token.fcm_token}')" class="text-[11px] bg-slate-100 p-1 rounded text-slate-500 font-mono token-cell block hover:text-indigo-600 transition-all">
                            ${token.fcm_token}
                        </code>
                    </td>
                    <td class="px-4 py-3 text-[11px] text-slate-500 whitespace-nowrap">
                        ${new Date(token.last_used_at).toLocaleDateString()}<br>
                        <span class="opacity-60">${new Date(token.last_used_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex flex-col gap-1.5 items-center">
                            <button onclick="selectToken('${token.fcm_token}')" class="w-full bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white px-2 py-1 rounded text-[10px] font-bold transition-all uppercase tracking-tighter">
                                Select
                            </button>
                            <button onclick="openModal('${token.fcm_token}')" class="text-slate-400 hover:text-slate-700 text-[10px] font-medium">
                                Details
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

 
        async function sendNotification() {

    const btn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    const payload = {
        projectId: document.getElementById('projectId').value.trim(),
        token: document.getElementById('fcmTokenInput').value.trim(),
        title: document.getElementById('notifTitle').value.trim(),
        body: document.getElementById('notifBody').value.trim(),
        url: document.getElementById('notifUrl').value.trim() || ""
    };

    // validations
    if (!payload.projectId) {
        showToast("Project ID required");
        return;
    }

    if (!payload.token || payload.token.length < 100) {
        showToast("Invalid FCM Token");
        return;
    }

    if (!payload.title) {
        showToast("Notification title required");
        return;
    }

    if (!payload.body) {
        showToast("Notification body required");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Sending...";

    statusBox.className = "mt-4 p-3 rounded-lg text-xs text-center bg-blue-50 text-blue-700 block";
    statusBox.innerText = "Sending notification...";

    console.log("Sending Payload:", payload);

    try {

        const response = await fetch("https://pinkvillapro-test.hf.space/send-notification", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        console.log("Server Response:", result);

        if (!response.ok) {
            throw new Error(result.error || "Unknown server error");
        }

        statusBox.className = "mt-4 p-3 rounded-lg text-xs text-center bg-green-100 text-green-800 block";
        statusBox.innerText = "Notification sent successfully";

        showToast("Notification Sent");

    } catch (err) {

        console.error("Notification Error:", err);

        statusBox.className = "mt-4 p-3 rounded-lg text-xs text-center bg-red-100 text-red-800 block";
        statusBox.innerText = "Error: " + err.message;

    } finally {

        btn.disabled = false;
        btn.innerHTML = "Send Now";

    }
}
        
        refreshBtn.addEventListener('click', fetchFCMTokens);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
